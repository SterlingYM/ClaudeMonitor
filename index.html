<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaudeMonitor</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2317171c'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%23a78bfa' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='3.5' fill='%234ade80'/%3E%3C/svg%3E">
<style>
:root {
  --bg:       #0e0e11;
  --surface:  #17171c;
  --surface2: #1f1f26;
  --border:   #2e2e3a;
  --border2:  #3d3d4d;
  --text:     #e2e2ea;
  --muted:    #6b6b80;
  --dimmer:   #3d3d4d;
  --accent:   #a78bfa;
  --green:    #4ade80;
  --lime:     #a3e635;
  --yellow:   #fbbf24;
  --orange:   #fb923c;
  --blue:     #60a5fa;
  --red:      #f87171;
  --mono: 'JetBrains Mono','Fira Mono','Cascadia Code','Menlo','Monaco',ui-monospace,monospace;
  --sans: ui-sans-serif,system-ui,-apple-system,sans-serif;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html,body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
}

.hidden { display: none !important; }

/* ── Header ──────────────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}
.header-icon {
  width: 28px; height: 28px;
  border-radius: 6px;
}
.header-title {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.header-name { color: var(--text); font-weight: 700; font-size: 15px; letter-spacing: .03em; }
.header-version { color: var(--muted); font-size: 10px; line-height: 1; }
.spacer { flex: 1; }
.conn {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
}
.conn-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--dimmer);
  transition: background .3s;
}
.conn-dot.ok  { background: var(--green); }
.conn-dot.err { background: var(--red); }

/* ── Layout: sidebar + main ──────────────────────────────────────── */
.app-layout {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* ── Left sidebar: project list ──────────────────────────────────── */
.sidebar {
  width: 260px;
  min-width: 200px;
  max-width: 340px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: relative;
}
.sidebar::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 1px;
  background: var(--border);
  z-index: 0;
}
.sidebar-label {
  padding: 8px 14px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.project-list {
  flex: 1;
  overflow-y: auto;
}
.pitem {
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  border-right: 3px solid transparent;
  transition: background .1s, border-color .1s;
  position: relative;
}
.pitem:hover           { background: var(--surface2); }
.pitem.active          {
  background: var(--bg);
  border-right: 3px solid var(--bg);
  margin-right: -1px;
  z-index: 1;
  position: relative;
}
.pitem.p-alarm         { border-left: 3px solid var(--orange); }
.pitem.active.p-alarm  { border-left: 3px solid var(--orange); }
@keyframes pitem-pulse {
  0%,100% { background: var(--surface); }
  50%      { background: rgba(251,146,60,.06); }
}
.pitem.p-alarm { animation: pitem-pulse 1.6s ease-in-out infinite; }
.pitem-name {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding-right: 18px;
}
.pitem-info {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
}
.pitem-count { color: var(--muted); }
.pitem-sep   { color: var(--border2); }
.pitem-time  { color: var(--muted); }
.pitem-status { font-weight: 500; }
.pitem-x {
  position: absolute;
  top: 8px;
  right: 10px;
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  opacity: 0;
  transition: opacity .12s, color .12s;
}
.pitem:hover .pitem-x  { opacity: .6; }
.pitem-x:hover         { opacity: 1 !important; color: var(--red); }
.pitem.is-dragging     { opacity: .35; }
.pitem.drag-above      { box-shadow: 0 -2px 0 var(--accent); }
.pitem.drag-below      { box-shadow: 0  2px 0 var(--accent); }

.ps-running  { color: var(--blue); }
.ps-waiting  { color: var(--orange); }
.ps-idle     { color: var(--green); }
.ps-starting { color: var(--muted); }
.ps-ended    { color: var(--dimmer); }

/* ── Right panel ─────────────────────────────────────────────────── */
.main-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* ── Session tabs ────────────────────────────────────────────────── */
.session-label {
  padding: 8px 18px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tabs {
  display: flex;
  gap: 3px;
  padding: 0;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  flex-shrink: 0;
  margin: 18px 18px 0 18px;
}
.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 13px;
  font: 12px var(--mono);
  color: var(--muted);
  cursor: pointer;
  border-radius: 6px 6px 0 0;
  border: 1px solid transparent;
  border-bottom: none;
  position: relative;
  bottom: -1px;
  transition: background .1s, color .1s;
  white-space: nowrap;
}
.tab:hover              { background: var(--surface2); color: var(--text); }
.tab.active             { background: var(--surface);  border-color: var(--border); border-bottom-color: var(--surface); color: var(--text); }
.tab.t-waiting          { color: var(--orange); }
.tab.active.t-waiting   { border-color: rgba(251,146,60,.5); }
.tab-x {
  margin-left: 4px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  opacity: 0;
  transition: opacity .12s, color .12s;
}
.tab:hover .tab-x       { opacity: .6; }
.tab-x:hover            { opacity: 1 !important; color: var(--red); }
.sub-tag {
  font-size: 10px;
  padding: 1px 4px;
  border-radius: 3px;
  background: rgba(96,165,250,.12);
  color: var(--blue);
}

/* ── Session panel ───────────────────────────────────────────────── */
.panel-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 0 18px 18px 18px;
}
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 8px 8px;
  overflow: hidden;
}
.panel-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 18px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
}
.meta { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.ml   { color: var(--muted); }
.mv   { font-family: var(--mono); }

/* Status badge */
.sbadge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 4px;
}
.sdot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.s-starting           { background: var(--surface2); color: var(--muted); }
.s-starting .sdot     { background: var(--muted); }
.s-running            { background: rgba(74,222,128,.1);  color: var(--green);  }
.s-running .sdot      { background: var(--green); animation: pulse 1.8s ease-in-out infinite; }
.s-idle               { background: rgba(74,222,128,.1); color: var(--green); }
.s-idle .sdot         { background: var(--green); }
.s-waiting_permission { background: rgba(251,146,60,.12); color: var(--orange); }
.s-waiting_permission .sdot { background: var(--orange); animation: pulse .85s ease-in-out infinite; }
.s-completed          { background: var(--surface2); color: var(--muted); }
.s-completed .sdot    { background: var(--muted); }
.s-dead               { background: rgba(248,113,113,.08); color: var(--red); }
.s-dead .sdot         { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ── Permission box ──────────────────────────────────────────────── */
.perm-box {
  margin: 14px 18px;
  border: 1px solid rgba(251,146,60,.35);
  border-radius: 6px;
  background: rgba(251,146,60,.05);
  overflow: hidden;
}
.perm-head {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 9px 14px;
  background: rgba(251,146,60,.08);
  font-size: 13px;
  font-weight: 600;
  color: var(--orange);
  border-bottom: 1px solid rgba(251,146,60,.2);
}
.perm-body   { padding: 14px; }
.perm-tool   { font: 13px var(--mono); color: var(--text); margin-bottom: 10px; }
.perm-tool b { color: var(--orange); }
.perm-code {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 12px;
  font: 12px var(--mono);
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 200px;
  overflow-y: auto;
  margin-bottom: 14px;
}
.perm-actions { display: flex; gap: 9px; }
.btn-approve, .btn-deny {
  padding: 7px 20px;
  border-radius: 5px;
  border: none;
  font: 600 13px var(--sans);
  cursor: pointer;
  transition: opacity .1s, background .1s;
}
.btn-approve { background: var(--green); color: #052e16; }
.btn-deny    { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-approve:hover:not(:disabled) { opacity: .85; }
.btn-deny:hover:not(:disabled)    { background: var(--border); }
.btn-approve:disabled, .btn-deny:disabled { opacity: .35; cursor: not-allowed; }
.perm-result {
  margin-top: 12px;
  font-size: 13px;
  font-weight: 500;
  min-height: 20px;
}
.perm-result.sending  { color: var(--muted); }
.perm-result.approved { color: var(--green); }
.perm-result.denied   { color: var(--red); }
.perm-result.timeout  { color: var(--yellow); }
.perm-result.error    { color: var(--red); }

/* ── Event log ───────────────────────────────────────────────────── */
.log-head {
  padding: 9px 18px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--muted);
  border-top: 1px solid var(--border);
}
.log {
  font: 12px/1.7 var(--mono);
  max-height: 260px;
  overflow-y: auto;
  padding-bottom: 6px;
}
.log-row {
  display: flex;
  gap: 10px;
  padding: 1px 18px;
}
.log-row:hover { background: var(--surface2); }
.lt  { color: var(--muted); flex-shrink: 0; }
.lev { flex-shrink: 0; min-width: 150px; }
.lx  { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.ev-SessionStart      { color: var(--green);  }
.ev-Stop              { color: var(--dimmer); }
.ev-SubagentStart     { color: var(--blue);   }
.ev-SubagentStop      { color: #3b82f6;       }
.ev-Notification      { color: var(--accent); }
.ev-PermissionRequest { color: var(--orange); }
.ev-PermissionDenied  { color: var(--red);    }
.ev-PreToolUse        { color: var(--muted);  }
.ev-PostToolUse       { color: var(--muted);  }
.ev-unknown           { color: var(--muted);  }

/* ── Keyboard hint bar ───────────────────────────────────────────── */
.kbd-bar {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  padding: 8px 18px;
  font-size: 11px;
  color: var(--muted);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.kbd-hint { display: flex; align-items: center; gap: 5px; }
kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 20px;
  height: 18px;
  padding: 0 5px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  font: 11px var(--mono);
  color: var(--text);
}

/* ── Empty state ─────────────────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 100px 20px;
  color: var(--muted);
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.empty-icon { font-size: 36px; opacity: .4; margin-bottom: 12px; }
.empty p    { font-size: 13px; margin-top: 6px; color: var(--dimmer); }

/* ── Scrollbars ──────────────────────────────────────────────────── */
::-webkit-scrollbar       { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border2); }
</style>
</head>
<body>

<div class="header">
  <img class="header-icon" src="icon.png" alt="CM">
  <div class="header-title">
    <span class="header-name">Claude Monitor</span>
    <span class="header-version">v0.1.0 · by YSM</span>
  </div>
  <div class="spacer"></div>
  <div class="conn">
    <div class="conn-dot" id="cdot"></div>
    <span id="cstatus">connecting</span>
  </div>
</div>

<div class="app-layout" id="app-layout">
  <!-- Left sidebar: projects -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-label">Projects</div>
    <div class="project-list" id="project-list"></div>
  </div>

  <!-- Right: sessions -->
  <div class="main-panel" id="main-panel">
    <div class="session-label">Sessions</div>
    <div class="tabs" id="tabs"></div>
    <div class="panel-wrap">
      <div id="panel"></div>
    </div>
  </div>
</div>

<div class="empty hidden" id="empty">
  <div class="empty-icon">◌</div>
  <div style="color:var(--muted)">No active Claude sessions</div>
  <p>Start a Claude Code session and it will appear here.</p>
</div>

<div class="kbd-bar" id="kbd-bar">
  <span class="kbd-hint"><kbd>a</kbd> approve</span>
  <span class="kbd-hint"><kbd>d</kbd> deny</span>
  <span class="kbd-hint"><kbd>x</kbd> dismiss</span>
  <span class="kbd-hint"><kbd>↑</kbd><kbd>↓</kbd> project</span>
  <span class="kbd-hint"><kbd>←</kbd><kbd>→</kbd> session</span>
</div>

<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────

let sessions    = [];
let allIncoming = [];
let completedAt = {};
let selectedCwd = null;
let selectedSid = null;
let tabOrder    = [];
let _dismissed  = new Set();

const HIDE_AFTER = 5 * 60 * 1000;
const STATUS_ICONS = {
  starting: '⟳', running: '●', idle: '●',
  waiting_permission: '⚠', completed: '✓', dead: '✗',
};
const STATUS_LABELS = {
  starting: 'starting', running: 'running', idle: 'idle',
  waiting_permission: 'waiting permission',
  completed: 'session ended', dead: 'dead',
};
function statusLabel(st) { return STATUS_LABELS[st] || st.replace(/_/g, ' '); }

// ── SSE ───────────────────────────────────────────────────────────────────

let sse = null;
let backoff = 1000;

function connect() {
  sse = new EventSource('/stream');
  sse.addEventListener('update', e => {
    backoff = 1000;
    setConn(true);
    const msg = JSON.parse(e.data);
    if (msg.type === 'state') applyState(msg.sessions);
  });
  sse.onerror = () => {
    setConn(false);
    sse.close();
    setTimeout(connect, backoff);
    backoff = Math.min(backoff * 2, 30000);
  };
}

function setConn(ok) {
  document.getElementById('cdot').className      = 'conn-dot ' + (ok ? 'ok' : 'err');
  document.getElementById('cstatus').textContent = ok ? 'live' : 'reconnecting…';
}

// ── State ─────────────────────────────────────────────────────────────────

function applyState(incoming) {
  allIncoming = incoming;
  const now = Date.now();

  for (const s of incoming) {
    const done = s.status === 'completed' || s.status === 'dead';
    if (done && !completedAt[s.id]) completedAt[s.id] = now;
    if (!done) delete completedAt[s.id];
  }

  sessions = incoming.filter(s => {
    if (_dismissed.has(s.id)) return false;
    const t = completedAt[s.id];
    return !t || now - t < HIDE_AFTER;
  });

  notifyPermissions(incoming);
  render();
  syncTitle();
}

setInterval(() => applyState(allIncoming.length ? allIncoming : sessions), 30000);

// ── Helpers ───────────────────────────────────────────────────────────────

function cwdSessions(cwd)  { return sessions.filter(s => (s.cwd || '?') === cwd); }
function shortId(id)       { return (id || '?').slice(0, 8); }
function icon(st)          { return STATUS_ICONS[st] || '?'; }

function splitCwd(cwd) {
  const parts = (cwd || '?').replace(/\/$/, '').split('/');
  const base  = parts.pop() || cwd;
  return { base, dir: parts.join('/') || '/' };
}

function fmtTime(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleTimeString([], { hour12: false }); }
  catch { return ''; }
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function groupByCwd() {
  const map = new Map();
  for (const s of sessions) {
    const cwd = s.cwd || '?';
    if (!map.has(cwd)) map.set(cwd, []);
    map.get(cwd).push(s);
  }
  return map;
}

function sortedCwds(map) {
  return [...map.keys()].sort((a, b) => {
    const aw = map.get(a).some(s => s.status === 'waiting_permission');
    const bw = map.get(b).some(s => s.status === 'waiting_permission');
    if (aw !== bw) return aw ? -1 : 1;
    const aT = Math.max(...map.get(a).map(s => +new Date(s.last_event_time || 0)));
    const bT = Math.max(...map.get(b).map(s => +new Date(s.last_event_time || 0)));
    return bT - aT;
  });
}

function timeAgo(iso) {
  if (!iso) return '—';
  const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (sec <  5)  return 'just now';
  if (sec < 60)  return `${sec}s ago`;
  const min = Math.floor(sec / 60);
  if (min < 60)  return `${min}m ago`;
  return `${Math.floor(min / 60)}h ago`;
}

function projectStatus(group) {
  if (group.some(s => s.status === 'waiting_permission')) return 'waiting';
  if (group.some(s => s.status === 'running'))             return 'running';
  if (group.some(s => s.status === 'starting'))            return 'starting';
  if (group.some(s => s.status === 'idle'))                return 'idle';
  return 'ended';
}

function updateTabOrder(liveCwds) {
  const set = new Set(liveCwds);
  tabOrder = tabOrder.filter(c => set.has(c));
  for (const c of liveCwds) {
    if (!tabOrder.includes(c)) tabOrder.push(c);
  }
}

function makeTabLabels(cwds) {
  const baseCounts = {};
  for (const cwd of cwds) {
    const { base } = splitCwd(cwd);
    baseCounts[base] = (baseCounts[base] || 0) + 1;
  }
  const baseSeq = {};
  const labels  = new Map();
  for (const cwd of [...cwds].sort()) {
    const { base } = splitCwd(cwd);
    if (baseCounts[base] > 1) {
      baseSeq[base] = (baseSeq[base] || 0) + 1;
      labels.set(cwd, `${base} ${baseSeq[base]}`);
    } else {
      labels.set(cwd, base);
    }
  }
  return labels;
}

// ── Render ────────────────────────────────────────────────────────────────

function render() {
  const map  = groupByCwd();
  const emptyEl = document.getElementById('empty');
  const layout  = document.getElementById('app-layout');
  const kbdBar  = document.getElementById('kbd-bar');

  if (sessions.length === 0) {
    emptyEl.classList.remove('hidden');
    layout.classList.add('hidden');
    kbdBar.classList.add('hidden');
    return;
  }

  emptyEl.classList.add('hidden');
  layout.classList.remove('hidden');
  kbdBar.classList.remove('hidden');

  updateTabOrder(sortedCwds(map));

  if (!selectedCwd || !map.has(selectedCwd)) {
    const alarm = tabOrder.find(c => map.get(c).some(s => s.status === 'waiting_permission'));
    selectedCwd = alarm || tabOrder[0];
    selectedSid = null;
  }

  renderProjectList(tabOrder, map);
  renderSessionView(map);
}

// ── Project list (sidebar) ───────────────────────────────────────────────

function renderProjectList(cwds, map) {
  const labels = makeTabLabels(cwds);
  const listEl = document.getElementById('project-list');

  listEl.innerHTML = cwds.map(cwd => {
    const group    = map.get(cwd);
    const topLevel = group.filter(s => !s.is_subagent);
    const status   = projectStatus(group);
    const isAlarm  = status === 'waiting';
    const active   = cwd === selectedCwd;

    const n          = topLevel.length;
    const countStr   = n === 1 ? '1 agent' : `${n} agents`;
    const lastMs     = Math.max(...group.map(s => +new Date(s.last_event_time || 0)));
    const timeStr    = lastMs > 0 ? timeAgo(new Date(lastMs).toISOString()) : '—';
    const statusText = status === 'waiting' ? 'waiting' : status;

    return `<div class="pitem${active ? ' active' : ''}${isAlarm ? ' p-alarm' : ''}" draggable="true" data-cwd="${esc(cwd)}">
      <div class="pitem-name">${esc(labels.get(cwd))}</div>
      <div class="pitem-info">
        <span class="pitem-count">${countStr}</span>
        <span class="pitem-sep">·</span>
        <span class="pitem-time">${timeStr}</span>
        <span class="pitem-sep">·</span>
        <span class="pitem-status ps-${status}">● ${statusText}</span>
      </div>
      <span class="pitem-x" data-cwd="${esc(cwd)}" title="Dismiss all sessions">×</span>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.pitem').forEach(el => {
    const cwd = el.dataset.cwd;

    el.addEventListener('click', e => {
      if (e.target.classList.contains('pitem-x')) return;
      selectProject(cwd);
    });

    el.addEventListener('dragstart', e => {
      _dragSrc = cwd;
      e.dataTransfer.effectAllowed = 'move';
      requestAnimationFrame(() => el.classList.add('is-dragging'));
    });

    el.addEventListener('dragend', () => {
      _dragSrc = null;
      el.classList.remove('is-dragging');
      listEl.querySelectorAll('.pitem').forEach(t =>
        t.classList.remove('drag-above', 'drag-below')
      );
    });

    el.addEventListener('dragover', e => {
      if (!_dragSrc || _dragSrc === cwd) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const mid = el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2;
      listEl.querySelectorAll('.pitem').forEach(t =>
        t.classList.remove('drag-above', 'drag-below')
      );
      el.classList.add(e.clientY < mid ? 'drag-above' : 'drag-below');
    });

    el.addEventListener('dragleave', () =>
      el.classList.remove('drag-above', 'drag-below')
    );

    el.addEventListener('drop', e => {
      e.preventDefault();
      if (!_dragSrc || _dragSrc === cwd) return;
      const mid = el.getBoundingClientRect().top + el.getBoundingClientRect().height / 2;
      const insertBefore = e.clientY < mid;
      const from = tabOrder.indexOf(_dragSrc);
      tabOrder.splice(from, 1);
      const to = tabOrder.indexOf(cwd);
      tabOrder.splice(insertBefore ? to : to + 1, 0, _dragSrc);
      _dragSrc = null;
      render();
    });
  });
  listEl.querySelectorAll('.pitem-x').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      dismissProject(el.dataset.cwd);
    });
  });
}

function selectProject(cwd) {
  selectedCwd = cwd;
  selectedSid = null;
  render();
}

// ── Session view (tabs + panel) ──────────────────────────────────────────

function sortedTabSessions(cwd) {
  return [...cwdSessions(cwd)].sort((a, b) => {
    if (a.is_subagent !== b.is_subagent) return a.is_subagent ? 1 : -1;
    const aw = a.status === 'waiting_permission', bw = b.status === 'waiting_permission';
    if (aw !== bw) return aw ? -1 : 1;
    return 0;
  });
}

function renderSessionView(map) {
  const group = cwdSessions(selectedCwd);

  if (!selectedSid || !group.find(s => s.id === selectedSid)) {
    const waiting = group.find(s => s.status === 'waiting_permission');
    selectedSid = (waiting || group[0] || {}).id || null;
  }

  const sorted = sortedTabSessions(selectedCwd);

  document.getElementById('tabs').innerHTML = sorted.map(s => {
    const active  = s.id === selectedSid;
    const waiting = s.status === 'waiting_permission';
    const cls = ['tab', active ? 'active' : '', waiting ? 't-waiting' : ''].filter(Boolean).join(' ');
    return `<div class="${cls}" data-sid="${esc(s.id)}">
      ${icon(s.status)} ${esc(shortId(s.id))}${s.is_subagent ? ' <span class="sub-tag">sub</span>' : ''}
      <span class="tab-x" data-sid="${esc(s.id)}" title="Dismiss session">×</span>
    </div>`;
  }).join('');

  document.getElementById('tabs').querySelectorAll('.tab').forEach(el =>
    el.addEventListener('click', e => {
      if (e.target.classList.contains('tab-x')) return;
      selectedSid = el.dataset.sid; renderSessionView(map);
    })
  );
  document.getElementById('tabs').querySelectorAll('.tab-x').forEach(el =>
    el.addEventListener('click', e => { e.stopPropagation(); dismissSession(el.dataset.sid); })
  );

  const sess    = group.find(s => s.id === selectedSid);
  const panelEl = document.getElementById('panel');
  if (!sess) { panelEl.innerHTML = ''; return; }

  panelEl.innerHTML = buildPanel(sess);

  const ba = panelEl.querySelector('.btn-approve');
  const bd = panelEl.querySelector('.btn-deny');
  if (ba) ba.addEventListener('click', () => relay(sess.id, 'approve', ba, bd));
  if (bd) bd.addEventListener('click', () => relay(sess.id, 'deny',    ba, bd));

  const log = panelEl.querySelector('.log');
  if (log) log.scrollTop = log.scrollHeight;
}

function buildPanel(s) {
  const canAct = s.status === 'waiting_permission';

  const meta = [
    `<div class="meta"><span class="ml">status</span>
       <span class="sbadge s-${esc(s.status)}"><span class="sdot"></span>${esc(statusLabel(s.status))}</span>
     </div>`,
    s.last_tool
      ? `<div class="meta"><span class="ml">last tool</span><span class="mv">${esc(s.last_tool)}</span></div>` : '',
    `<div class="meta"><span class="ml">session</span><span class="mv" style="color:var(--muted)">${esc(s.id)}</span></div>`,
    s.is_subagent && s.parent_session_id
      ? `<div class="meta"><span class="ml">parent</span><span class="mv" style="color:var(--blue)">${esc(shortId(s.parent_session_id))}</span></div>` : '',
  ].filter(Boolean).join('');

  const permBox = s.permission_request ? buildPermBox(s.permission_request, canAct) : '';

  const logRows = (s.events || []).map(e => {
    const extra = [
      e.tool || '',
      (e.extra && e.extra.notification_type) ? e.extra.notification_type : '',
      (e.extra && e.extra.message)            ? e.extra.message           : '',
    ].filter(Boolean).join(' · ');
    return `<div class="log-row">
      <span class="lt">${esc(fmtTime(e.time))}</span>
      <span class="lev ev-${esc(e.event || 'unknown')}">${esc(e.event || '?')}</span>
      ${extra ? `<span class="lx">${esc(extra)}</span>` : ''}
    </div>`;
  }).join('') || `<div class="log-row" style="color:var(--muted)">No events recorded yet.</div>`;

  return `<div class="panel">
    <div class="panel-meta">${meta}</div>
    ${permBox}
    <div class="log-head">Event log</div>
    <div class="log">${logRows}</div>
  </div>`;
}

function buildPermBox(pr, canAct) {
  const inputStr = typeof pr.tool_input === 'object'
    ? JSON.stringify(pr.tool_input, null, 2)
    : String(pr.tool_input ?? '');
  const dis = canAct ? '' : ' disabled';
  return `<div class="perm-box">
    <div class="perm-head">⚠ Permission Request</div>
    <div class="perm-body">
      <div class="perm-tool">Tool: <b>${esc(pr.tool_name)}</b></div>
      <div class="perm-code">${esc(inputStr)}</div>
      <div class="perm-actions">
        <button class="btn-approve"${dis}>Approve</button>
        <button class="btn-deny"${dis}>Deny</button>
      </div>
      <div class="perm-result"></div>
    </div>
  </div>`;
}

// ── Dismiss ──────────────────────────────────────────────────────────────

async function dismissSession(sid) {
  _dismissed.add(sid);
  applyState(allIncoming);
  try {
    await fetch(`/sessions/${encodeURIComponent(sid)}/dismiss`, { method: 'POST' });
  } catch (err) {
    console.error('dismiss failed:', err);
  }
}

async function dismissProject(cwd) {
  const group = cwdSessions(cwd);
  await Promise.all(group.map(s => dismissSession(s.id)));
}

// ── Permission relay ──────────────────────────────────────────────────────

async function relay(sid, decision, ba, bd) {
  if (ba) ba.disabled = true;
  if (bd) bd.disabled = true;

  const resultEl = document.querySelector('.perm-result');
  if (resultEl) {
    resultEl.className = 'perm-result sending';
    resultEl.textContent = 'Sending…';
  }

  let data;
  try {
    const r = await fetch(`/sessions/${encodeURIComponent(sid)}/${decision}`, { method: 'POST' });
    data = await r.json();
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
  } catch (err) {
    console.error('relay failed:', err);
    if (resultEl) {
      resultEl.className = 'perm-result error';
      resultEl.textContent = `Error: ${err.message}`;
    }
    if (ba) ba.disabled = false;
    if (bd) bd.disabled = false;
    return;
  }

  if (!data.ok) {
    if (resultEl) {
      resultEl.className = 'perm-result timeout';
      resultEl.textContent = '⚠ Permission already resolved (hook timed out)';
    }
    if (ba) ba.disabled = false;
    if (bd) bd.disabled = false;
    return;
  }

  if (resultEl) {
    if (decision === 'approve') {
      resultEl.className = 'perm-result approved';
      resultEl.textContent = '✓ Approved — Claude will proceed';
    } else {
      resultEl.className = 'perm-result denied';
      resultEl.textContent = '✗ Denied';
    }
  }
}

// ── Title & notifications ─────────────────────────────────────────────────

function syncTitle() {
  const n = sessions.filter(s => s.status === 'waiting_permission').length;
  document.title = n > 0 ? `(${n}) ClaudeMonitor` : 'ClaudeMonitor';
}

let _lastNotified = new Set();

function notifyPermissions(incoming) {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;

  const nowWaiting = new Set(
    incoming.filter(s => s.status === 'waiting_permission').map(s => s.id)
  );

  for (const s of incoming) {
    if (s.status !== 'waiting_permission') continue;
    if (_lastNotified.has(s.id)) continue;
    const { base } = splitCwd(s.cwd);
    const tool = (s.permission_request && s.permission_request.tool_name) || 'tool';
    new Notification('⚠ Permission Request', {
      body: `${base}  ·  ${tool}`,
      tag:  s.id,
      requireInteraction: true,
    });
    _lastNotified.add(s.id);
  }

  for (const id of _lastNotified) {
    if (!nowWaiting.has(id)) _lastNotified.delete(id);
  }
}

(function requestNotifPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') Notification.requestPermission();
})();

// ── Keyboard shortcuts ────────────────────────────────────────────────────

function switchProject(dir) {
  if (!tabOrder.length) return;
  const idx = tabOrder.indexOf(selectedCwd);
  const next = ((idx === -1 ? 0 : idx) + dir + tabOrder.length) % tabOrder.length;
  selectProject(tabOrder[next]);
}

function switchSessionTab(dir) {
  if (!selectedCwd) return;
  const sorted = sortedTabSessions(selectedCwd);
  if (!sorted.length) return;
  const idx  = sorted.findIndex(s => s.id === selectedSid);
  const next = ((idx === -1 ? 0 : idx) + dir + sorted.length) % sorted.length;
  selectedSid = sorted[next].id;
  render();
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;

  switch (e.key) {
    case 'a': case 'A': {
      if (!selectedSid) break;
      const sess = sessions.find(s => s.id === selectedSid);
      if (sess && sess.status === 'waiting_permission') {
        e.preventDefault();
        const ba = document.querySelector('.btn-approve');
        const bd = document.querySelector('.btn-deny');
        if (ba && !ba.disabled) relay(sess.id, 'approve', ba, bd);
      }
      break;
    }
    case 'd': case 'D': {
      if (!selectedSid) break;
      const sess = sessions.find(s => s.id === selectedSid);
      if (sess && sess.status === 'waiting_permission') {
        e.preventDefault();
        const ba = document.querySelector('.btn-approve');
        const bd = document.querySelector('.btn-deny');
        if (bd && !bd.disabled) relay(sess.id, 'deny', ba, bd);
      }
      break;
    }
    case 'x': case 'X':
      if (selectedSid) { e.preventDefault(); dismissSession(selectedSid); }
      break;
    case 'ArrowUp':    e.preventDefault(); switchProject(-1);     break;
    case 'ArrowDown':  e.preventDefault(); switchProject(1);      break;
    case 'ArrowRight': e.preventDefault(); switchSessionTab(1);   break;
    case 'ArrowLeft':  e.preventDefault(); switchSessionTab(-1);  break;
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────

connect();
</script>
